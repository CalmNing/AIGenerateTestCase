version: '3.8'
services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - npm_cache:/root/.npm
      - uv_cache:/root/.cache/uv
    networks:
      - app-network
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
#      - KEYCLOAK_EXTERNAL_URL=http://localhost:8090
      - KEYCLOAK_EXTERNAL_URL=http://192.168.13.110:8090
      - KEYCLOAK_REALM=ai-testcase
      - KEYCLOAK_CLIENT_ID=backend
      - KEYCLOAK_ADMIN_URL=http://keycloak:8080
      - KEYCLOAK_ADMIN_REALM=master
      - KEYCLOAK_ADMIN_CLIENT_ID=admin-cli
      - KEYCLOAK_ADMIN_USERNAME=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KEYCLOAK_SYNC_STRICT=false
      - KEYCLOAK_SYNC_RETRIES=6
      - KEYCLOAK_SYNC_RETRY_DELAY=5
#      - CORS_ORIGINS=http://localhost:5173,http://localhost:8001
      - npm_config_cache=/root/.npm
      - NO_UPDATE_NOTIFIER=1
      - CORS_ORIGINS=http://localhost:5173,http://192.168.13.110:8001

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8001:8001"
    depends_on:
      - backend
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: 192.168.13.110
#      KC_HOSTNAME: localhost
#      KC_HOSTNAME_PORT: 8090
#      KC_HOSTNAME_STRICT: "false"
#      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      KC_JAVA_OPTS: "-Xms64m -Xmx512m -XX:MetaspaceSize=128m"
    volumes:
      - ./keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e \"GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n\" >&3;if [ $? -eq 0 ];then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lanhu-mcp:
    build:
      context: ./lanhu-mcp
      dockerfile: Dockerfile
    container_name: lanhu-mcp
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - lanhu_mcp_data:/app/data
      - lanhu_mcp_logs:/app/logs
    env_file:
      - ./lanhu-mcp/.env
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - TZ=Asia/Shanghai
    networks:
      - app-network

volumes:
  backend_data:
  npm_cache:
  uv_cache:
  postgres_data:
  lanhu_mcp_data:
  lanhu_mcp_logs:

networks:
  app-network:
    driver: bridge
